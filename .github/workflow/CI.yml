on: 
  pull_request:
    branches:
      - develop
      - deployment
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome Check
        run: pnpm check # biome check . is inside the package

      - name: Type Check
        run: pnpm exec tsc --noEmit 

      - name: Production Build
        run: pnpm build
